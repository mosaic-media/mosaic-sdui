// Package mosaic.session.v1 is the first-party client session transport
// (ADR 0041): a typed, two-lane RPC surface generated from this one .proto into
// every client language. It supersedes the bespoke WebSocket of ADR 0032 and
// folds ADR 0033's live handover into stream resume.
//
// Two lanes, mapping onto the two gRPC shapes supported uniformly on every
// target client (web via Connect, Flutter, Compose, Swift):
//
//   - Lane 1 — intents (unary). Navigate, Invoke, SubmitInput, Attach. Each
//     resolves to the same application command/query the HTTP path would; the
//     command boundary (ADR 0016) and caller model (ADR 0017) are unchanged.
//   - Lane 2 — push (server-streaming). One long-lived Subscribe stream per
//     session over which the server pushes region updates, shell mutations,
//     toasts and unsolicited events. resume_cursor replays what a reconnecting
//     client missed.
//
// Deliberately no bidirectional streaming: unary + server-streaming are the one
// pair browsers support, so the wire stays uniform across all four clients.
//
// UINode subtrees ride the envelope as the typed mosaic.sdui.v1.UINode — ADR
// 0044 (option (b) of ADR 0041): the SDUI contract is protobuf, so the whole
// wire is typed end to end. Open bags that are genuinely screen- or
// action-specific (params, input, event payloads) still ride as JSON bytes.
syntax = "proto3";

package mosaic.session.v1;

import "mosaic/sdui/v1/sdui.proto";

option go_package = "github.com/mosaic-media/sdui/gen/mosaic/session/v1;sessionv1";

// SessionService is the live client session. Intents are unary; push is one
// server-streaming call. Over HTTP/2 both lanes multiplex onto a single
// connection, so the two-lane logical split costs one physical connection.
service SessionService {
  // Attach (re)binds this caller to a session and declares the route it wants
  // shown. A reconnecting client calls it to re-assert the exact screen that
  // was open, the same re-declaration the ADR 0032 socket did on reconnect.
  rpc Attach(AttachRequest) returns (Ack);
  // Navigate opens a screen; the server renders it into the content region on
  // the push lane.
  rpc Navigate(NavigateRequest) returns (Ack);
  // Invoke runs a named action (an SDUI Action, ADR 0029) — a mutation — and
  // pushes a toast plus a re-render of the current content.
  rpc Invoke(InvokeRequest) returns (Ack);
  // SubmitInput carries one search-as-you-type keystroke. The Platform
  // debounces these against session state before sourcing, so a fast typist
  // does not fan out a request per keystroke to the upstream addons.
  rpc SubmitInput(InputRequest) returns (Ack);

  // Subscribe opens the push lane: one long-lived server-stream per session.
  // resume_cursor replays what a reconnecting client missed (superseding ADR
  // 0033's handover).
  rpc Subscribe(SubscribeRequest) returns (stream ServerMessage);
}

// Ack is the empty reply to an intent. An intent either succeeds (Ack) or fails
// with a Connect/gRPC error carrying a Platform error category; its visible
// effect arrives on the push lane, not in this reply.
message Ack {}

// AttachRequest binds a session and optionally declares the route to show.
message AttachRequest {
  string session = 1; // opaque session ref (ADR 0017); auth is on this call.
  string screen = 2;  // optional route to (re-)assert; empty leaves it unchanged.
  bytes params = 3;   // optional screen params as a JSON object (see params note).
  // What this client can actually play (ADR 0047). Optional: a client that
  // declares nothing gets whatever the server assumes, which is what every
  // client got before this field existed.
  ClientProfile profile = 4;
}

// ClientProfile is what a client can decode, declared once per connection.
//
// It exists because the server was guessing. Stream selection (ADR 0048) ranks a
// source's candidates against what the caller can play, and with no declaration
// the Platform hard-coded a desktop browser's abilities at the call site —
// honest for one client and a lie for the four the transport was built to serve
// (ADR 0041).
//
// The client is the only thing that knows. A browser can answer precisely via
// canPlayType (ADR 0070); a native player knows its own decoders. Neither is
// something a server can infer from a user agent without being wrong eventually.
//
// It is also what the resolution cache is keyed on (ADR 0049): the Platform
// reduces this to a stable class, so clients that decode the same things share
// one cached resolution rather than each paying for their own.
message ClientProfile {
  // Containers, video and audio codecs the client can decode, as the names
  // ffprobe uses ("matroska", "hevc", "eac3") so a declaration and a probe are
  // directly comparable rather than two vocabularies.
  repeated string containers = 1;
  repeated string video_codecs = 2;
  repeated string audio_codecs = 3;
  // Whether the client can *render* high dynamic range, which is a separate
  // question from decoding the codec that carries it: an SDR display given
  // HDR10 renders it wrong rather than not at all.
  bool hdr = 4;
  // Largest useful height, 0 for uncapped. A phone gains nothing from pixels it
  // cannot show and pays for them in bandwidth.
  int32 max_height = 5;
}

// NavigateRequest opens a screen.
message NavigateRequest {
  string session = 1;
  string screen = 2;
  bytes params = 3; // screen params as a JSON object (see params note).
}

// InvokeRequest runs a named action. input is the action's argument envelope in
// the SDUI runtime's JSON shape (ADR 0029), carried opaquely and decoded by the
// action's Platform handler.
message InvokeRequest {
  string session = 1;
  string action = 2; // the action/mutation name, e.g. "importContent".
  bytes input = 3;   // JSON argument envelope.
}

// InputRequest carries one search-as-you-type value.
message InputRequest {
  string session = 1;
  string value = 2;
}

// SubscribeRequest opens the push lane. resume_cursor is the last
// ServerMessage.seq the client saw; 0 on a fresh connect.
message SubscribeRequest {
  string session = 1;
  uint64 resume_cursor = 2;
}

// ServerMessage is one push. seq is monotonic per session and is the resume
// cursor a reconnecting client presents.
//
// A note on params/input as JSON bytes: screen params and action inputs are an
// open, screen- and action-specific bag (a content ref, a season number, a
// search string), so they ride as a JSON object rather than a fixed message —
// the typed envelope carries an open payload where the payload is genuinely
// open, while the UI tree itself is the typed mosaic.sdui.v1.UINode.
message ServerMessage {
  uint64 seq = 1;
  oneof body {
    RegionUpdate region = 2; // a named region changed.
    ShellUpdate shell = 3;   // the app shell (re)rendered.
    Toast toast = 4;         // a transient notice.
    Event event = 5;         // an unsolicited domain event.
  }
}

// RegionUpdate applies one operation to a named region (ADR 0029 / 0031). The
// op-set is contract-owned and transport-agnostic: a Compose composable, a
// SwiftUI view and a React component apply the same ops.
message RegionUpdate {
  // Op is the region operation. REPLACE is the whole-region default; the
  // narrower ops let a producer target part of a region without resending it.
  enum Op {
    REPLACE = 0;
    APPEND = 1;
    PREPEND = 2;
    REMOVE = 3;
    PATCH = 4;
  }
  string region = 1; // a named slot (ADR 0029 / 0031), e.g. "content".
  Op op = 2;
  mosaic.sdui.v1.UINode ui_node = 3; // the typed UINode subtree (ADR 0044).
}

// ShellUpdate carries the app shell UINode tree (ADR 0031). It is sent once on
// connect and again only if the shell itself changes.
message ShellUpdate {
  mosaic.sdui.v1.UINode ui_node = 1; // the typed shell UINode tree (ADR 0044).
}

// Toast is a transient notice — the confirmation an Invoke pushes.
message Toast {
  string message = 1;
  string tone = 2; // "success" | "danger" | "info" — an SDUI tone.
}

// Event is an unsolicited domain event: an import finished, a config changed, a
// library edit from another device. This is the channel request/response cannot
// provide and the reason a live lane exists at all.
message Event {
  string type = 1;   // event type name.
  bytes payload = 2; // event-specific JSON payload.
}
